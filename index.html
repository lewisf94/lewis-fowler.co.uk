<style>
/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { overflow-x: hidden; line-height: 1; }

/* ═══════════════════════════════════════════════════════
   DESIGN TOKENS  —  tweak anything here
   ═══════════════════════════════════════════════════════ */
:root {

  /* ── COLOURS ────────────────────────────────────────── */
  --bg:#f4efe6;               /* page background */
  --bg2:#ece6db;              /* subtle surface (cards, inputs) */
  --bg3:rgba(184,50,50,.06);  /* very light accent tint */
  --bg4:#e8e1d4;              /* slightly darker surface */
  --fg:#1a1208;               /* primary text */
  --fg2:#6b5e52;              /* secondary text */
  --fg3:rgba(26,18,8,.3);     /* muted / placeholder text */
  --accent:#b83232;           /* brand red */
  --border:rgba(26,18,8,.12); /* visible border */
  --border2:rgba(26,18,8,.06);/* hairline border */
  --grid:rgba(26,18,8,.04);   /* hero background grid lines */
  --glow:rgba(184,50,50,.09); /* cursor glow tint */
  --skill-a:#b83232;          /* skills category colour A */
  --skill-b:#16a34a;          /* skills category colour B */
  --skill-c:#1e3a5f;          /* skills category colour C */

  /* ── TYPOGRAPHY ─────────────────────────────────────── */
  --fh:'DM Serif Display',serif;
  --fb:'DM Sans',sans-serif;
  --fm:'Fira Code',monospace;
  --logo-size:17px;           /* nav logo text size */
  --logo-name-gap:0px;        /* extra space between "Lewis" and "Fowler" (+ = more, − = tighter) */
  --logo-img:28px;            /* logo icon size */
  --nav-size:12px;            /* nav link font size */
  --hero-h1-size:clamp(56px,9vw,120px); /* hero heading */
  --hero-h1-leading:.95;      /* hero heading line-height */
  --hero-bio-size:17px;       /* hero bio paragraph */
  --sec-title-size:clamp(34px,4.5vw,56px); /* section headings */
  --body-size:15px;           /* prose paragraphs */
  --small-size:14px;          /* secondary / card text */
  --stat-n-size:36px;         /* hero stat number */

  /* ── SPACING ────────────────────────────────────────── */
  --pad-x:52px;               /* main horizontal padding — nav, sections, footer */
  --nav-y:22px;               /* nav top & bottom padding */
  --nav-gap:40px;             /* gap between Work / Skills / Experience links */
  --sec-pad:120px;            /* section top & bottom padding */
  --sec-title-mb:64px;        /* space below section headings */
  --sec-label-mb:18px;        /* space below section eyebrow labels */
  --hero-pad-top:80px;        /* hero content clearance from top (nav height) */
  --hero-eyebrow-mb:28px;     /* space below "Design Engineer" line */
  --hero-h1-mb:28px;          /* space below "Lewis Fowler" heading */
  --hero-bio-mb:52px;         /* space below bio paragraph */
  --hero-cta-gap:14px;        /* space between CTA buttons */
  --hero-stat-gap:32px;       /* space between stat items (right column) */
  --card-pad:44px;            /* project card / contact cell inner padding */
  --card-gap:2px;             /* hairline gap between cards */
  --card-badge-mb:28px;       /* space below the category badge on a card */

  /* ── SIZING ─────────────────────────────────────────── */
  --max-w:1200px;             /* max content width */
  --grid-cell:52px;           /* hero background grid square size */
  --glow-size:560px;          /* hero cursor glow circle diameter */
  --skills-h:460px;           /* height of the physics skills canvas */
  --scrollbar-w:5px;          /* scrollbar width */
  --viewer-h:180px;           /* 3D viewer height in project card */
  --viewer-h-active:280px;    /* 3D viewer height in full-width active card */
  --viewer-h-study:55vh;      /* case study hero model viewer height */
  --viewer-h-modal:320px;     /* legacy modal viewer height */

  /* ── ANIMATION ──────────────────────────────────────── */
  --dur-fast:.2s;             /* hover / micro-interactions */
  --dur-base:.3s;             /* UI state transitions */
  --dur-slow:.8s;             /* scroll reveal */
  --ease:cubic-bezier(.25,.46,.45,.94);    /* main ease-out */
  --ease-reveal:cubic-bezier(.2,.7,.2,1); /* scroll reveal */
  --hero-pulse:2.4s;          /* scroll-cue line pulse duration */

  /* ── MISC ───────────────────────────────────────────── */
  --r:1px;                    /* border-radius (keep small for industrial feel) */
  --sh:0 2px 20px rgba(26,18,8,.08); /* standard card shadow */
}

/* ── BASE ───────────────────────────────────────────── */
body { background:var(--bg); color:var(--fg); font-family:var(--fb); transition:background .4s,color .4s; }
::selection { background:var(--accent); color:var(--bg); }
::-webkit-scrollbar { width:var(--scrollbar-w); }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── CURSOR CROSSHAIR ───────────────────────────────── */
.cursor-crosshair {
  position:fixed; top:0; left:0; pointer-events:none;
  z-index:9999; color:var(--accent); opacity:0;
  transition:opacity var(--dur-fast) ease;
  mix-blend-mode:multiply;
  will-change:transform;
}
.cursor-crosshair svg { display:block; transition:transform var(--dur-fast) ease, opacity var(--dur-fast) ease; }
.cursor-crosshair.hover svg { transform:scale(1.6); opacity:.8; }
@media (hover: none), (pointer: coarse) {
  .cursor-crosshair { display:none !important; }
}

/* ── LOGO ───────────────────────────────────────────── */
.logo-img { width:var(--logo-img); height:var(--logo-img); flex-shrink:0; display:block; }

/* ── NAV ────────────────────────────────────────────── */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--nav-y) var(--pad-x); transition:background var(--dur-base),border-color var(--dur-base),backdrop-filter var(--dur-base);
}
.nav.scrolled {
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter:blur(16px); border-bottom:1px solid var(--border2);
}
.nav-logo {
  font-family:var(--fh); font-size:var(--logo-size); font-weight:700;
  letter-spacing:-0.02em; color:var(--fg); text-decoration:none;
}
.nav-logo span { color:var(--accent); margin-left:var(--logo-name-gap); }
.nav-links { display:flex; gap:var(--nav-gap); }
.nav-links a {
  color:var(--fg2); font-size:var(--nav-size); text-decoration:none;
  letter-spacing:.08em; text-transform:uppercase; font-family:var(--fm);
  transition:color var(--dur-fast);
}
.nav-links a:hover { color:var(--accent); }


/* ── HERO ───────────────────────────────────────────── */
.hero {
  position:relative; width:100%; height:100vh;
  display:flex; align-items:center; overflow:hidden; background:var(--bg);
}
.hero-grid {
  position:absolute; inset:0; z-index:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:var(--grid-cell) var(--grid-cell);
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}
.hero-glow {
  position:absolute; z-index:1; width:var(--glow-size); height:var(--glow-size); border-radius:50%;
  background:radial-gradient(circle,var(--glow) 0%,transparent 70%);
  pointer-events:none; transform:translate(-50%,-50%);
  transition:opacity .4s; opacity:0;
}
.hero-inner {
  position:relative; z-index:2; padding:0 var(--pad-x); padding-top:var(--hero-pad-top);
  width:100%; max-width:var(--max-w); margin:0 auto;
}
.hero-eyebrow {
  display:flex; align-items:center; gap:14px;
  font-family:var(--fm); font-size:11px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--accent); margin-bottom:var(--hero-eyebrow-mb);
}
.hero-eyebrow::before { content:''; width:36px; height:1px; background:var(--accent); }
.hero-h1 {
  font-family:var(--fh); font-weight:700; line-height:var(--hero-h1-leading);
  letter-spacing:-0.04em; color:var(--fg); margin-bottom:var(--hero-h1-mb);
  font-size:var(--hero-h1-size);
}
.hero-h1 .accent { color:var(--accent); }
.hero-bio {
  font-family:var(--fb); font-size:var(--hero-bio-size); line-height:1.65;
  color:var(--fg2); max-width:480px; margin-bottom:var(--hero-bio-mb); font-weight:400;
}
.hero-ctas { display:flex; gap:var(--hero-cta-gap); flex-wrap:wrap; }
.btn-p {
  font-family:var(--fm); font-size:var(--nav-size); letter-spacing:.1em; text-transform:uppercase;
  background:var(--accent); color:var(--bg); border:none; padding:15px 36px;
  cursor:pointer; font-weight:600; border-radius:var(--r); text-decoration:none;
  display:inline-block; will-change:transform;
  transition:opacity var(--dur-fast), transform .4s var(--ease);
}
.btn-p:hover { opacity:.85; }
.btn-g {
  font-family:var(--fm); font-size:var(--nav-size); letter-spacing:.1em; text-transform:uppercase;
  background:transparent; color:var(--fg); border:1px solid var(--border); padding:15px 36px;
  cursor:pointer; border-radius:var(--r); text-decoration:none; display:inline-block;
  will-change:transform;
  transition:border-color var(--dur-fast), color var(--dur-fast), transform .4s var(--ease);
}
.btn-g:hover { border-color:var(--accent); color:var(--accent); }
.hero-meta {
  position:absolute; right:var(--pad-x); bottom:0; top:var(--hero-pad-top);
  display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:52px;
  gap:var(--hero-stat-gap); z-index:2;
}
.hero-stat { text-align:right; }
.hero-stat-n { font-family:var(--fh); font-size:var(--stat-n-size); font-weight:700; color:var(--fg); letter-spacing:-0.04em; }
.hero-stat-l { font-family:var(--fm); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg2); margin-top:4px; }
.scroll-cue {
  position:absolute; bottom:36px; left:var(--pad-x); z-index:2;
  display:flex; align-items:center; gap:14px;
  font-family:var(--fm); font-size:10px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--fg3);
}
.scroll-line { width:48px; height:1px; background:var(--accent); animation:scrollPulse var(--hero-pulse) ease-in-out infinite; transform-origin:left; }
@keyframes scrollPulse { 0%,100%{transform:scaleX(.4);opacity:.4} 50%{transform:scaleX(1);opacity:1} }



/* ── SECTIONS ───────────────────────────────────────── */
.wrap { max-width:var(--max-w); margin:0 auto; padding:0 var(--pad-x); }
.sec { padding:var(--sec-pad) 0; border-top:1px solid var(--border2); }
.sec-label {
  display:flex; align-items:center; gap:12px;
  font-family:var(--fm); font-size:10px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--accent); margin-bottom:var(--sec-label-mb);
}
.sec-label::before { content:attr(data-n); opacity:.45; }
.sec-title {
  font-family:var(--fh); font-size:var(--sec-title-size);
  font-weight:700; letter-spacing:-0.035em; color:var(--fg);
  margin-bottom:var(--sec-title-mb); line-height:1.05;
}

/* ── REVEAL ON SCROLL ───────────────────────────────── */
.reveal-x {
  opacity:0; transform:translateX(-40px);
  transition:opacity var(--dur-slow) var(--ease-reveal), transform var(--dur-slow) var(--ease-reveal);
}
.reveal-x.in { opacity:1; transform:translateX(0); }
.sec-title.reveal-x { transition-delay:.08s; }
@media (prefers-reduced-motion: reduce) {
  .reveal-x { opacity:1; transform:none; transition:none; }
}

/* ── PROJECTS ───────────────────────────────────────── */
.proj-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:var(--card-gap); background:var(--border2); border:1px solid var(--border2); }
.proj-card {
  background:var(--bg); padding:var(--card-pad); cursor:pointer;
  transition:background var(--dur-fast); position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
.proj-card:hover { background:var(--bg2); }
.proj-card::after {
  content:''; position:absolute; top:0; left:0; bottom:0; width:3px;
  background:var(--accent); transform:scaleY(0); transform-origin:bottom;
  transition:transform var(--dur-base) ease;
}
.proj-card:hover::after { transform:scaleY(1); }
.proj-badge {
  display:inline-flex; align-items:center;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--accent); border:1px solid var(--border); padding:5px 12px;
  margin-bottom:var(--card-badge-mb); border-radius:var(--r); width:fit-content;
}
.proj-placeholder {
  width:100%; height:var(--viewer-h); margin-bottom:var(--card-badge-mb);
  background:repeating-linear-gradient(135deg,var(--bg2) 0,var(--bg2) 8px,var(--bg4) 8px,var(--bg4) 16px);
  border:1px solid var(--border2); border-radius:var(--r);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg3); flex-shrink:0;
}
.proj-title { font-family:var(--fh); font-size:22px; font-weight:700; letter-spacing:-0.025em; color:var(--fg); margin-bottom:10px; }
.proj-short { font-size:var(--small-size); color:var(--fg2); line-height:1.6; margin-bottom:24px; flex:1; }
.proj-tags { display:flex; flex-wrap:wrap; gap:6px; }
.proj-tag {
  font-family:var(--fm); font-size:10px; color:var(--fg2);
  padding:4px 9px; background:var(--bg3); border:1px solid var(--border2);
  border-radius:var(--r); letter-spacing:.04em;
}
.proj-arrow { position:absolute; bottom:32px; right:36px; color:var(--accent); font-size:22px; opacity:0; transition:opacity var(--dur-fast),transform var(--dur-fast); }
.proj-card:hover .proj-arrow { opacity:1; transform:translate(3px,-3px); }

/* ── 3D MODEL VIEWER ────────────────────────────────── */
.model-viewer {
  width:100%; height:var(--viewer-h); margin-bottom:var(--card-badge-mb);
  background:repeating-linear-gradient(135deg,var(--bg2) 0,var(--bg2) 8px,var(--bg4) 8px,var(--bg4) 16px);
  border:1px solid var(--border2); border-radius:var(--r);
  position:relative; overflow:hidden; flex-shrink:0;
}
.model-viewer canvas { display:block; width:100% !important; height:100% !important; }
.model-viewer.loading::after {
  content:'Loading 3D model…'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg3);
}
.modal-viewer { height:var(--viewer-h-modal); margin-bottom:40px; }
.proj-model-wrap { position:relative; }
.reveal-hint {
  position:absolute; top:10px; left:12px; z-index:3;
  font-family:var(--fm); font-size:9px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--accent);
  pointer-events:none; opacity:.55; transition:opacity var(--dur-fast);
  display:flex; align-items:center; gap:8px;
}
.reveal-hint::before { content:''; width:14px; height:1px; background:var(--accent); }
.proj-model-wrap:hover .reveal-hint { opacity:0; }
.viewer-toggle {
  position:absolute; bottom:12px; right:12px; z-index:2;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg2);
  background:color-mix(in srgb, var(--bg) 90%, transparent);
  border:1px solid var(--border); padding:6px 12px;
  border-radius:var(--r); cursor:pointer;
  transition:color var(--dur-fast),border-color var(--dur-fast);
}
.viewer-toggle:hover { color:var(--accent); border-color:var(--accent); }
.proj-card-active { grid-column:1/-1; }
.proj-card-active .model-viewer { height:var(--viewer-h-active); }
.proj-planned { opacity:.55; cursor:default; }
.proj-planned .proj-arrow { display:none; }
.proj-planned-badge {
  display:inline-block; font-family:var(--fm); font-size:9px;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--fg3); border:1px solid var(--border2);
  padding:3px 8px; border-radius:var(--r); margin-top:8px;
}
.cs-hero-toggle {
  position:absolute; bottom:20px; right:20px; z-index:10;
  font-family:var(--fm); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg2);
  background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(8px);
  border:1px solid var(--border); padding:8px 18px;
  border-radius:var(--r); cursor:pointer;
  transition:color var(--dur-fast),border-color var(--dur-fast),background var(--dur-fast);
}
.cs-hero-toggle:hover { color:var(--accent); border-color:var(--accent); }
.cs-hero-toggle.active { color:var(--accent); border-color:var(--accent); }

/* ── MODAL ──────────────────────────────────────────── */
.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.65); backdrop-filter:blur(10px);
  display:flex; align-items:center; justify-content:center;
  padding:24px; animation:fadeIn .2s ease;
}
.modal {
  background:var(--bg2); border:1px solid var(--border);
  width:100%; max-width:740px; max-height:88vh; overflow-y:auto;
  padding:52px; border-radius:calc(var(--r)*3);
  box-shadow:var(--sh); animation:slideUp .28s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-close {
  float:right; margin-left:16px; background:none; border:1px solid var(--border);
  color:var(--fg2); padding:8px 18px; cursor:pointer; font-family:var(--fm);
  font-size:11px; letter-spacing:.1em; text-transform:uppercase; border-radius:var(--r);
  transition:color var(--dur-fast),border-color var(--dur-fast);
}
.modal-close:hover { color:var(--accent); border-color:var(--accent); }
.modal-tag { font-family:var(--fm); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
.modal-h { font-family:var(--fh); font-size:30px; font-weight:700; letter-spacing:-0.03em; color:var(--fg); margin-bottom:8px; }
.modal-sub { font-size:14px; color:var(--fg2); margin-bottom:36px; }
.modal-placeholder {
  width:100%; height:220px; margin-bottom:40px;
  background:repeating-linear-gradient(135deg,var(--bg) 0,var(--bg) 8px,var(--bg2) 8px,var(--bg2) 16px);
  border:1px solid var(--border2); border-radius:var(--r);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg3);
}
.modal-sh { font-family:var(--fm); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; margin-top:32px; }
.modal-p { font-size:var(--body-size); line-height:1.75; color:var(--fg2); }
.modal-code {
  background:var(--bg4); border:1px solid var(--border2); padding:18px 22px;
  font-family:var(--fm); font-size:13px; color:var(--accent);
  border-radius:var(--r); margin:12px 0; overflow-x:auto; white-space:nowrap;
}
.modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:32px; }

/* ── CASE STUDY ─────────────────────────────────────── */
@keyframes csPageIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.cs-page { min-height:100vh; background:var(--bg); animation:csPageIn .35s ease; }
.cs-nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--nav-y) var(--pad-x);
  background:color-mix(in srgb, var(--bg) 82%, transparent);

/* ── MODEL VIEWER ───────────────────────────────────── */
function ModelViewer({ path, revealPath = null, withControls = false, autoRotate = true, display = {} }) {
  const mountRef = useRef(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!path || !mountRef.current) return;

    let disposed = false;
    let animId = null;
    let resizeObs = null;
    let renderer, scene, camera, controls, model;
    let spotlight = null;
    let canvasRef = null;
    let onCanvasMove = null, onCanvasLeave = null;

    const init = () => {
      if (!window.THREE || !window.GLTFLoader) {
        window.addEventListener('three-ready', init, { once: true });
        return;
      }
      const THREE = window.THREE;
      const mount = mountRef.current;
      if (!mount) return;

      const w = mount.clientWidth || 400;
      const h = mount.clientHeight || 180;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 1000);
      // ── PER-MODEL DISPLAY TWEAKS (edit display:{} on each project in DATA) ──
      const CARD_SCALE   = display.cardScale   ?? 2.0;
      const STUDY_SCALE  = display.studyScale  ?? 1.8;
      const CARD_Y       = display.cardY       ?? 0;
      const STUDY_Y      = display.studyY      ?? 0;
      const CAMERA_Z     = display.cameraZ     ?? 3.2;
      const ROT_CENTER_Y = display.rotCenterY  ?? 0;
      // ─────────────────────────────────────────────────────────────────────────
      camera.position.set(0, 0.4, CAMERA_Z);

      renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      mount.appendChild(renderer.domElement);
      canvasRef = renderer.domElement;

      scene.add(new THREE.AmbientLight(0xffffff, 1.6));
      const key = new THREE.DirectionalLight(0xffffff, 2.2);
      key.position.set(4, 6, 5); scene.add(key);
      const fill = new THREE.DirectionalLight(0xffffff, 1.1);
      fill.position.set(-5, 3, 4); scene.add(fill);
      const back = new THREE.DirectionalLight(0xffffff, 0.9);
      back.position.set(0, -2, -5); scene.add(back);

      if (withControls && window.TrackballControls) {
        controls = new window.TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 4.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.noPan = true;
        controls.staticMoving = false;
        controls.dynamicDampingFactor = 0.15;
        controls.minDistance = 1.5;
        controls.maxDistance = 8;
      }


      const matSat = (mat) => {
        if (!mat || !mat.color) return -1;
        const {r, g, b} = mat.color;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        return max > 0.01 ? (max - min) / max : 0;
      };

      const applyMaterialPairing = (root) => {
        const meshes = [];
        root.traverse(c => { if (c.isMesh) meshes.push(c); });
        const groups = new Map();
        meshes.forEach(mesh => {
          if (!mesh.geometry) return;
          const vCount = mesh.geometry.attributes.position?.count || 0;
          if (!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
          const sz = new THREE.Vector3();
          mesh.geometry.boundingBox.getSize(sz);
          const sig = `${vCount}|${Math.abs(sz.x).toFixed(2)}|${Math.abs(sz.y).toFixed(2)}|${Math.abs(sz.z).toFixed(2)}`;
          if (!groups.has(sig)) groups.set(sig, []);
          groups.get(sig).push(mesh);
        });
        groups.forEach(group => {
          if (group.length < 2) return;
          let best = null, bestSat = -1;
          group.forEach(mesh => {
            const m = Array.isArray(mesh.material) ? mesh.material[0] : mesh.material;
            const s = matSat(m);
            if (s > bestSat) { bestSat = s; best = m; }
          });
          if (best && bestSat > 0.1) {
            group.forEach(mesh => { mesh.material = best; });
          }
        });
      };

      const orientAndPair = (m) => {
        const baseQ = new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
        const offQ  = new THREE.Quaternion().setFromEuler(new THREE.Euler(
          (display.orientX ?? 0) * Math.PI / 180,
          (display.orientY ?? 0) * Math.PI / 180,
          (display.orientZ ?? 0) * Math.PI / 180
        ));
        m.quaternion.multiplyQuaternions(baseQ, offQ);
        applyMaterialPairing(m);
      };

      // fitInsideUnit only handles scale + centering; Y offsets go on the wrapper in finishWithGroup
      const fitInsideUnit = (root, targetSize) => {
        const box = new THREE.Box3().setFromObject(root);
        const size = new THREE.Vector3(); box.getSize(size);
        const center = new THREE.Vector3(); box.getCenter(center);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = targetSize / maxDim;
        root.scale.setScalar(scale);
        root.position.sub(center.multiplyScalar(scale));
        root.position.y -= ROT_CENTER_Y;
      };

      // Wraps the positioned child in a Group whose origin sits at the bbox centre.
      // Rotating the wrapper spins around that centre, not the model's corner.
      const finishWithGroup = (child) => {
        const wrapper = new THREE.Group();
        wrapper.add(child);
        wrapper.position.y = withControls ? STUDY_Y : CARD_Y;
        scene.add(wrapper);
        model = wrapper;
        setLoading(false);
      };

      const injectSpotlight = (mat, sp) => {
        if (!mat || mat._spotlightInjected) return;
        mat._spotlightInjected = true;
        mat.transparent = true;
        const prev = mat.onBeforeCompile;
        mat.onBeforeCompile = (shader) => {
          if (prev) prev(shader);
          shader.uniforms.uPts = { value: sp.pts };
          shader.uniforms.uWeights = { value: sp.weights };
          shader.uniforms.uActive = sp.active;
          shader.uniforms.uRadiusPx = sp.radiusPx;
          shader.fragmentShader = shader.fragmentShader
            .replace('#include <common>',
              `#include <common>
              uniform vec2 uPts[3];
              uniform float uWeights[3];
              uniform float uActive;
              uniform float uRadiusPx;`)
            .replace('#include <dithering_fragment>',
              `#include <dithering_fragment>
              if (uActive > 0.001) {
                float r = uRadiusPx;
                float field = 0.0;
                for (int i = 0; i < 3; i++) {
                  float d = distance(gl_FragCoord.xy, uPts[i]);
                  float k = max(0.0, 1.0 - d / r);
                  field += k * k * uWeights[i];
                }
                gl_FragColor.a *= 1.0 - smoothstep(${CONFIG.spotlightFade[0]}, ${CONFIG.spotlightFade[1]}, field * uActive);
              }`);
        };
        mat.needsUpdate = true;
      };

      const loadOne = (p) => new Promise((resolve, reject) => {
        new window.GLTFLoader().load(p, (gltf) => resolve(gltf.scene), undefined, reject);
      });

      if (revealPath) {
        Promise.all([loadOne(path), loadOne(revealPath)]).then(([shell, inner]) => {
          if (disposed) return;
          orientAndPair(shell);
          orientAndPair(inner);
          const group = new THREE.Group();
          group.add(inner);
          group.add(shell);
          fitInsideUnit(group, withControls ? STUDY_SCALE : CARD_SCALE);

          const cw0 = renderer.domElement.width;
          const ch0 = renderer.domElement.height;
          spotlight = {
            pts: [
              new THREE.Vector2(cw0 * 0.5, ch0 * 0.5),
              new THREE.Vector2(cw0 * 0.5, ch0 * 0.5),
              new THREE.Vector2(cw0 * 0.5, ch0 * 0.5),
            ],
            weights: [1.4, 1.0, 0.65],
            manualPx: new THREE.Vector2(cw0 * 0.5, ch0 * 0.5),
            active: { value: 0 },
            cursorMode: false,
            radiusPx: { value: CONFIG.spotlightRadius * renderer.getPixelRatio() },
          };
          shell.traverse(c => {
            if (!c.isMesh) return;
            const mats = Array.isArray(c.material) ? c.material : [c.material];
            mats.forEach(m => injectSpotlight(m, spotlight));
          });

          onCanvasMove = (e) => {
            const rect = canvasRef.getBoundingClientRect();
            const pr = renderer.getPixelRatio();
            spotlight.manualPx.set(
              (e.clientX - rect.left) * pr,
              (rect.height - (e.clientY - rect.top)) * pr
            );
            spotlight.cursorMode = true;
          };
          onCanvasLeave = () => { spotlight.cursorMode = false; };
          canvasRef.addEventListener('mousemove', onCanvasMove);
          canvasRef.addEventListener('mouseleave', onCanvasLeave);

          finishWithGroup(group);
        }).catch(err => {
          console.warn('GLB load failed:', err);
          setLoading(false);
        });
      } else {
        loadOne(path).then((m) => {
          if (disposed) return;
          orientAndPair(m);
          fitInsideUnit(m, withControls ? STUDY_SCALE : CARD_SCALE);
          finishWithGroup(m);
        }).catch(err => {
          console.warn('GLB load failed:', err);
          setLoading(false);
        });
      }

      resizeObs = new ResizeObserver(() => {
        if (!mount || !renderer || !camera) return;
        const rw = mount.clientWidth, rh = mount.clientHeight;
        renderer.setSize(rw, rh);
        camera.aspect = rw / rh;
        camera.updateProjectionMatrix();
        if (spotlight) spotlight.radiusPx.value = CONFIG.spotlightRadius * renderer.getPixelRatio();
      });
      resizeObs.observe(mount);

      const spinQ = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), CONFIG.spinSpeed);

      const tick = () => {
        if (disposed) return;
        if (model && autoRotate) model.quaternion.premultiply(spinQ);
        if (spotlight) {
          const pts = spotlight.pts;
          if (spotlight.cursorMode) {
            pts[0].lerp(spotlight.manualPx, CONFIG.trailLerp[0]);
            pts[1].lerp(pts[0],             CONFIG.trailLerp[1]);
            pts[2].lerp(pts[1],             CONFIG.trailLerp[2]);
            spotlight.active.value += (1.0 - spotlight.active.value) * CONFIG.activateSpeed;
          } else {
            spotlight.active.value += (0.0 - spotlight.active.value) * CONFIG.deactivateSpeed;
          }
        }
        if (controls) controls.update();
        renderer.render(scene, camera);
        animId = requestAnimationFrame(tick);
      };
      tick();
    };

    init();

    return () => {
      disposed = true;
      if (animId) cancelAnimationFrame(animId);
      if (resizeObs) resizeObs.disconnect();
      if (controls) controls.dispose();
      if (canvasRef && onCanvasMove) canvasRef.removeEventListener('mousemove', onCanvasMove);
      if (canvasRef && onCanvasLeave) canvasRef.removeEventListener('mouseleave', onCanvasLeave);
      if (renderer) {
        renderer.dispose();
        if (renderer.domElement && renderer.domElement.parentNode) {
          renderer.domElement.parentNode.removeChild(renderer.domElement);
        }
      }
      if (scene) {
        scene.traverse(o => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) {
            const mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach(m => m.dispose && m.dispose());
          }
        });
      }
    };
  }, [path, revealPath, withControls, autoRotate]);

  const viewerH = withControls ? display.studyViewerH : display.cardViewerH;
  return <div ref={mountRef} className={`model-viewer${withControls ? ' modal-viewer' : ''}${loading ? ' loading' : ''}${revealPath ? ' reveal-viewer' : ''}`} style={viewerH ? {height: viewerH} : undefined}></div>;
}

/* ── HERO ───────────────────────────────────────────── */
function Hero() {
  const heroRef = useRef(null);
  const glowRef = useRef(null);

  useEffect(() => {
    const hero = heroRef.current;
    const glow = glowRef.current;
    if (!hero || !glow) return;
    let rafId = null;
    let tx = hero.clientWidth / 2, ty = hero.clientHeight / 2;

    const onMove = e => {
      const r = hero.getBoundingClientRect();
      tx = e.clientX - r.left; ty = e.clientY - r.top;
      glow.style.opacity = '1';
      if (!rafId) rafId = requestAnimationFrame(tick);
    };
    const tick = () => {
      glow.style.left = tx + 'px'; glow.style.top = ty + 'px';
      rafId = null;
    };
    const onLeave = () => { glow.style.opacity = '0'; };
    hero.addEventListener('mousemove', onMove);
    hero.addEventListener('mouseleave', onLeave);
    return () => {
      hero.removeEventListener('mousemove', onMove);
      hero.removeEventListener('mouseleave', onLeave);
      if (rafId) cancelAnimationFrame(rafId);
    };
  }, []);

  const name = DATA.profile.name;
  const [first, last] = name.split(' ');

  return (
    <section className="hero" ref={heroRef}>
      <div className="hero-grid"></div>
      <div className="hero-glow" ref={glowRef}></div>
      {/* Industrial decoration */}
      <div style={{position:'absolute',top:100,right:52,width:100,height:100,border:'1px solid var(--accent)',opacity:.2,zIndex:2}}>
        <div style={{position:'absolute',top:'25%',left:'25%',width:'50%',height:'50%',border:'1px solid var(--accent)'}}></div>
        <div style={{position:'absolute',top:'50%',left:0,right:0,height:'1px',background:'var(--accent)'}}></div>
        <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:'1px',background:'var(--accent)'}}></div>
      </div>
      <div style={{position:'absolute',bottom:80,left:52,fontFamily:'var(--fm)',fontSize:10,color:'var(--accent)',opacity:.35,letterSpacing:'.14em',zIndex:2}}>
        {CONTENT.hero.locationTag}
      </div>
      <div className="hero-inner">
        <div className="hero-eyebrow">{DATA.profile.current}</div>
        <h1 className="hero-h1">{first} {last}</h1>
        <p className="hero-bio">{DATA.profile.bio}</p>
        <div className="hero-ctas">
          {CONTENT.hero.ctas.map(c => (
            <a key={c.label} href={c.href} className={c.primary ? 'btn-p' : 'btn-g'}>{c.label}</a>
          ))}
        </div>
      </div>
      <div className="hero-meta">
        {DATA.stats.map((s,i) => (
          <div className="hero-stat" key={i}>
            <div className="hero-stat-n">{s.n}</div>
            <div className="hero-stat-l">{s.l}</div>

        ))}
      </div>
      <div className="scroll-cue">
        <div className="scroll-line"></div>
        <span>{CONTENT.hero.scrollCue}</span>
      </div>
    </section>
  );
}

/* ── SKILLS ─────────────────────────────────────────── */
function Skills({ themeKey }) {
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!wrapRef.current || !window.Matter) return;
    const wrap = wrapRef.current;
    const { Engine, Render, World, Bodies, Mouse, MouseConstraint, Runner, Events } = Matter;
    const W = wrap.clientWidth || 1100;
    const H = 460;

    const engine = Engine.create();
    const render = Render.create({
      element: wrap, engine,
      options: { width: W, height: H, wireframes: false, background: 'transparent', pixelRatio: Math.min(window.devicePixelRatio, 2) }
    });

    const wall = { isStatic: true, render: { fillStyle: 'transparent', strokeStyle: 'transparent', lineWidth: 0 } };
    World.add(engine.world, [
      Bodies.rectangle(W/2, H+25, W, 50, wall),
      Bodies.rectangle(-25,  H/2, 50, H,  wall),
      Bodies.rectangle(W+25, H/2, 50, H,  wall),
    ]);

    // Read CSS skill category colors at runtime
    const cs = getComputedStyle(document.documentElement);
    const catColor = {
      Software:   cs.getPropertyValue('--skill-a').trim() || '#3b82f6',
      Mechanical: cs.getPropertyValue('--skill-b').trim() || '#f59e0b',
      Embedded:   cs.getPropertyValue('--skill-c').trim() || '#10b981',
    };

    DATA.skills.forEach((s, i) => {
      const tw = Math.max(120, s.name.length * 9 + 44);
      const th = 46;
      const x = Math.random() * (W - 180) + 90;
      const y = -Math.random() * 380 - 60;
      const b = Bodies.rectangle(x, y, tw, th, {
        restitution: .5, friction: .4,
        chamfer: { radius: 8 },
        label: s.name,
        plugin: { color: catColor[s.cat] || '#64748b', w: tw, h: th },
      });
      World.add(engine.world, b);
    });

    const mouse = Mouse.create(render.canvas);
    mouse.pixelRatio = Math.min(window.devicePixelRatio, 2);
    // Matter.js attaches mousewheel listeners that call preventDefault — strip them
    // so the page can still scroll when the cursor is over the physics canvas.
    mouse.element.removeEventListener('mousewheel', mouse.mousewheel);
    mouse.element.removeEventListener('DOMMouseScroll', mouse.mousewheel);
    const mc = MouseConstraint.create(engine, { mouse, constraint: { stiffness: .2, render: { visible: false } } });
    World.add(engine.world, mc);
    render.mouse = mouse;

    Events.on(render, 'afterRender', () => {
      const ctx = render.context;
      const fgColor = getComputedStyle(document.documentElement).getPropertyValue('--fg').trim() || '#fff';
      const fontM = "'Fira Code', monospace";
      engine.world.bodies.forEach(b => {
        if (b.isStatic) return;
        const { x, y } = b.position;
        const a = b.angle;
        const { color = '#64748b', w = 120, h = 46 } = b.plugin || {};
        const r = 8;
        ctx.save();
        ctx.translate(x, y); ctx.rotate(a);
        // pill bg
        ctx.beginPath();
        ctx.moveTo(-w/2+r,-h/2); ctx.lineTo(w/2-r,-h/2);
        ctx.quadraticCurveTo(w/2,-h/2,w/2,-h/2+r);
        ctx.lineTo(w/2,h/2-r); ctx.quadraticCurveTo(w/2,h/2,w/2-r,h/2);
        ctx.lineTo(-w/2+r,h/2); ctx.quadraticCurveTo(-w/2,h/2,-w/2,h/2-r);
        ctx.lineTo(-w/2,-h/2+r); ctx.quadraticCurveTo(-w/2,-h/2,-w/2+r,-h/2);
        ctx.closePath();
        ctx.fillStyle = color + '28'; ctx.fill();
        ctx.strokeStyle = color + '80'; ctx.lineWidth = 1; ctx.stroke();
        // label
        ctx.fillStyle = fgColor;
        ctx.font = `500 12px ${fontM}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(b.label, 0, 0);
        ctx.restore();
      });
    });

    const runner = Runner.create();
    Runner.run(runner, engine);
    Render.run(render);

    return () => {
      Render.stop(render); Runner.stop(runner);
      World.clear(engine.world); Engine.clear(engine);
      if (render.canvas) render.canvas.remove();
    };
  }, [themeKey]);

  return (
    <section id="skills" className="sec" style={{paddingTop:120,paddingBottom:0,borderTop:'1px solid var(--border2)'}}>
      <div className="wrap" style={{paddingBottom:64}}>
        <div className="sec-label" data-n={`${CONTENT.sections.skills.num} /`}>{CONTENT.sections.skills.label}</div>
        <div className="sec-title" style={{marginBottom:0}}>{CONTENT.sections.skills.title}</div>
      </div>
      <div className="skills-wrap" ref={wrapRef}>
        <div className="skills-hint">Drag to interact</div>
      </div>
    </section>
  );
}

/* ── APP ────────────────────────────────────────────── */
/* ── SECTION TITLE REVEAL ───────────────────────────── */
function useSectionReveal() {
  useEffect(() => {
    const targets = document.querySelectorAll('.sec-label, .sec-title');
    targets.forEach(el => el.classList.add('reveal-x'));
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.2, rootMargin: '0px 0px -10% 0px' });
    targets.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ── MAGNETIC BUTTONS ───────────────────────────────── */
function useMagneticButtons() {
  useEffect(() => {
    if (!window.matchMedia('(hover: hover)').matches) return;
    const RANGE = 85, STRENGTH = 0.38;
    const reset = () => {
      document.querySelectorAll('.btn-p, .btn-g').forEach(b => { b.style.transform = ''; });
    };
    const onMove = (e) => {
      document.querySelectorAll('.btn-p, .btn-g').forEach(btn => {
        const r = btn.getBoundingClientRect();
        const dx = e.clientX - (r.left + r.width / 2);
        const dy = e.clientY - (r.top + r.height / 2);
        const dist = Math.hypot(dx, dy);
        if (dist < RANGE) {
          const f = (1 - dist / RANGE) * STRENGTH;
          btn.style.transform = `translate(${dx * f}px, ${dy * f}px)`;
        } else {
          btn.style.transform = '';
        }
      });
    };
    window.addEventListener('mousemove', onMove);
    document.addEventListener('mouseleave', reset);
    return () => {
      window.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseleave', reset);
      reset();
    };
  }, []);
}

/* ── CURSOR CROSSHAIR ───────────────────────────────── */
function CursorCrosshair() {
  const ref = useRef(null);
  useEffect(() => {
    if (!window.matchMedia('(hover: hover)').matches) return;
    const el = ref.current;
    if (!el) return;
    let tx = 0, ty = 0, x = 0, y = 0, raf = null, started = false;
    const tick = () => {
      tx += (x - tx) * 0.28;
      ty += (y - ty) * 0.28;
      el.style.transform = `translate(${tx}px, ${ty}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(tick);
    };
    const onMove = (e) => {
      x = e.clientX; y = e.clientY;
      if (!started) { tx = x; ty = y; started = true; }
      el.style.opacity = '0.55';
      if (!raf) raf = requestAnimationFrame(tick);
    };
    const onLeave = () => { el.style.opacity = '0'; };
    const onOver = (e) => {
      const t = e.target;
      const interactive = t.closest && t.closest('a, button, .proj, [role="button"]');
      el.classList.toggle('hover', !!interactive);
    };
    window.addEventListener('mousemove', onMove);
    document.addEventListener('mouseleave', onLeave);
    window.addEventListener('mouseover', onOver);
    return () => {
      window.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseleave', onLeave);
      window.removeEventListener('mouseover', onOver);
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);
  return (
    <div className="cursor-crosshair" ref={ref} aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <rect x="10" y="10" width="8" height="8" fill="none" stroke="currentColor" strokeWidth="1"/>
        <line x1="14" y1="1" x2="14" y2="7" stroke="currentColor" strokeWidth="1"/>
        <line x1="14" y1="21" x2="14" y2="27" stroke="currentColor" strokeWidth="1"/>
        <line x1="1" y1="14" x2="7" y2="14" stroke="currentColor" strokeWidth="1"/>
        <line x1="21" y1="14" x2="27" y2="14" stroke="currentColor" strokeWidth="1"/>
      </svg>
    </div>
  );
}

function DiagramCard({ d }) {
  const [lb, setLb] = useState(false);
  return (
    <>
      <div className="cs-diagram-wrap" onClick={() => setLb(true)}>
        <img src={d.path} alt={d.label} />
        <span className="cs-diagram-hint">Click to zoom</span>
        <div className="cs-diagram-label">{d.label}</div>
      </div>
      {lb && <DiagramLightbox src={d.path} alt={d.label} onClose={() => setLb(false)} />}
    </>
  );
}

function DiagramLightbox({ src, alt, onClose }) {
  const [scale, setScale] = useState(1);
  const [pan, setPan]     = useState({ x:0, y:0 });
  const dragging          = useRef(false);
  const lastPos           = useRef({ x:0, y:0 });
  const wrapRef           = useRef(null);
  const MIN = 0.5, MAX = 8;

  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const onWheel = e => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      setScale(s => Math.min(MAX, Math.max(MIN, s * delta)));
    };
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    el.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKey);
    return () => {
      el.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
    };
  }, [onClose]);

  const onMouseDown = e => {
    if (e.button !== 0) return;
    dragging.current = true;
    lastPos.current = { x: e.clientX, y: e.clientY };
    e.preventDefault();
  };
  const onMouseMove = e => {
    if (!dragging.current) return;
    const dx = e.clientX - lastPos.current.x;
    const dy = e.clientY - lastPos.current.y;
    lastPos.current = { x: e.clientX, y: e.clientY };
    setPan(p => ({ x: p.x + dx, y: p.y + dy }));
  };
  const onMouseUp = () => { dragging.current = false; };

  return ReactDOM.createPortal(
    <div ref={wrapRef} className="diagram-lb"
      onMouseMove={onMouseMove} onMouseUp={onMouseUp}
      onClick={e => { if (e.target === e.currentTarget && !dragging.current) onClose(); }}>
      <button className="diagram-lb-close" onClick={e => { e.stopPropagation(); onClose(); }}>✕ Close</button>
      <div className="diagram-lb-inner" onMouseDown={onMouseDown} style={{ cursor:'grab' }}>
        <img src={src} alt={alt} draggable="false"
          style={{ pointerEvents:'none', display:'block',
            transform: `translate(${pan.x}px,${pan.y}px) scale(${scale})` }} />
      </div>
      <div className="diagram-lb-zoom" onClick={e => e.stopPropagation()}>
        <button onClick={() => setScale(s => Math.min(MAX, s * 1.25))}>+</button>
        <button onClick={() => setScale(s => Math.max(MIN, s / 1.25))}>−</button>
        <button onClick={() => { setScale(1); setPan({x:0,y:0}); }}>⟳</button>
        <span className="diagram-lb-hint">Scroll · Drag to pan · Esc to close</span>
      </div>
    </div>,
    document.body
  );
}
