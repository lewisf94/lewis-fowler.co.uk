function DiagramLightbox({ src, alt, onClose }) {
  const [scale, setScale] = useState(1);
  const [pan, setPan]     = useState({ x:0, y:0 });
  const dragging          = useRef(false);
  const lastPos           = useRef({ x:0, y:0 });
  const touchState        = useRef(null);
  const wrapRef           = useRef(null);
  const MIN = 0.5, MAX = 8;

  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const onWheel = e => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      setScale(s => Math.min(MAX, Math.max(MIN, s * delta)));
    };
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    el.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden'; // lock page scroll behind the lightbox
    return () => {
      el.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  const onMouseDown = e => {
    if (e.button !== 0) return;
    dragging.current = true;
    lastPos.current = { x: e.clientX, y: e.clientY };
    e.preventDefault();
  };
  const onMouseMove = e => {
    if (!dragging.current) return;
    const dx = e.clientX - lastPos.current.x;
    const dy = e.clientY - lastPos.current.y;
    lastPos.current = { x: e.clientX, y: e.clientY };
    setPan(p => ({ x: p.x + dx, y: p.y + dy }));
  };
  const onMouseUp = () => { dragging.current = false; };

  // Touch: one finger pans, two fingers pinch-zoom (touch-action:none on the
  // container stops the browser from scrolling/zooming the page instead).
  const onTouchStart = e => {
    if (e.touches.length >= 2) {
      const [a, b] = [e.touches[0], e.touches[1]];
      touchState.current = { mode:'pinch', d: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY) };
    } else if (e.touches.length === 1) {
      touchState.current = { mode:'pan', x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  };
  const onTouchMove = e => {
    const s = touchState.current;
    if (!s) return;
    if (s.mode === 'pan' && e.touches.length === 1) {
      const t = e.touches[0];
      setPan(p => ({ x: p.x + t.clientX - s.x, y: p.y + t.clientY - s.y }));
      s.x = t.clientX; s.y = t.clientY;
    } else if (s.mode === 'pinch' && e.touches.length >= 2) {
      const [a, b] = [e.touches[0], e.touches[1]];
      const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      if (s.d > 0) setScale(sc => Math.min(MAX, Math.max(MIN, sc * (d / s.d))));
      s.d = d;
    }
  };
  const onTouchEnd = e => {
    if (e.touches.length === 0) touchState.current = null;
    else onTouchStart(e); // fingers lifted mid-gesture: re-anchor with the rest
  };

  return ReactDOM.createPortal(
    <div ref={wrapRef} className="diagram-lb"
      onMouseMove={onMouseMove} onMouseUp={onMouseUp}
      onClick={e => { if (e.target === e.currentTarget && !dragging.current) onClose(); }}>
      <button className="diagram-lb-close" onClick={e => { e.stopPropagation(); onClose(); }}>✕ Close</button>
      <div className="diagram-lb-inner" onMouseDown={onMouseDown}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{ cursor:'grab' }}>
        <img src={src} alt={alt} draggable="false"
          style={{ pointerEvents:'none', display:'block',
            transform: `translate(${pan.x}px,${pan.y}px) scale(${scale})` }} />
      </div>
      <div className="diagram-lb-zoom" onClick={e => e.stopPropagation()}>
        <button onClick={() => setScale(s => Math.min(MAX, s * 1.25))}>+</button>
        <button onClick={() => setScale(s => Math.max(MIN, s / 1.25))}>−</button>
        <button onClick={() => { setScale(1); setPan({x:0,y:0}); }}>⟳</button>
        <span className="diagram-lb-hint">Scroll · Drag to pan · Esc to close</span>
      </div>
    </div>,
    document.body
  );
}

function CaseStudy({ proj }) {
  const idx = DATA.projects.findIndex(p => p.id === proj.id);
  const prev = DATA.projects[idx - 1] || null;
  const next = DATA.projects[idx + 1] || null;
  const [showInternals, setShowInternals] = useState(false);
  const modelPath = proj.model
    ? (showInternals && proj.model.internalsPath ? proj.model.internalsPath : proj.model.path)
    : null;

  useEffect(() => { window.scrollTo(0, 0); setShowInternals(false); }, [proj.id]);

  return (
    <div className="cs-page">
      <nav className="cs-nav">
        <a href="#work" className="cs-back">{CONTENT.nav.csBack}</a>
        {(() => { const [fn,ln] = DATA.profile.name.split(' '); return (
          <a href="#" className="nav-logo" style={{display:'flex',alignItems:'center',gap:10}}>
            <img src="assets/icons/logo-red.png" className="logo-img" alt="" width="28" height="28" />
            {fn} <span>{ln}</span>
          </a>
        ); })()}
      </nav>

      <div className="cs-hero">
        {modelPath
          ? <ModelViewer key={modelPath} path={modelPath} withControls={true} autoRotate={false} display={proj.display} />
          : <div className="modal-placeholder">3D model — {proj.title}</div>}
        {proj.model?.internalsPath && (
          <button
            className={`cs-hero-toggle${showInternals ? ' active' : ''}`}
            onClick={() => setShowInternals(v => !v)}
          >{showInternals ? 'Exterior' : 'Internals'}</button>
        )}
      </div>

      <div className="cs-header">
        <div className="cs-tags-row">
          {proj.tags.map(t => <span key={t} className="proj-tag">{t}</span>)}
        </div>
        <h1 className="cs-title">{proj.title}</h1>
        <div className="cs-subtitle">{proj.short}</div>
      </div>

      <div className="cs-body">
        <div className="cs-section">
          <h2 className="cs-sh">Overview</h2>
          <p className="cs-p">{proj.intro}</p>
        </div>
        <div className="cs-section">
          <h2 className="cs-sh">Technical Approach</h2>
          <p className="cs-p">{proj.tech}</p>
        </div>
        {proj.diagrams && (
          <div className="cs-section">
            <h2 className="cs-sh">Wiring Diagrams</h2>
            {proj.diagrams.map((d, i) => (
              <DiagramCard key={i} d={d} />
            ))}
          </div>
        )}

        <div className="cs-section">
          <h2 className="cs-sh">Key Equation</h2>
          <div className="cs-code">{proj.math}</div>
        </div>
        <div className="cs-section">
          <h2 className="cs-sh">Challenge & Solution</h2>
          <p className="cs-p">{proj.challenges}</p>
        </div>

        {proj.specs && (
          <div className="cs-section">
            <h2 className="cs-sh">Specifications</h2>
            <div className="cs-specs">
              {proj.specs.map(s => (
                <div key={s.label} className="cs-spec">
                  <span className="cs-spec-label">{s.label}</span>
                  <span className="cs-spec-value">{s.value}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {proj.results && (
          <div className="cs-section">
            <h2 className="cs-sh">Results</h2>
            <p className="cs-p">{proj.results}</p>
          </div>
        )}

        {proj.timeline && (
          <div className="cs-section">
            <h2 className="cs-sh">Timeline</h2>
            <div className="cs-tl">
              {proj.timeline.map((t, i) => (
                <div key={i} className="cs-tl-item">
                  <div className="cs-tl-date">{t.date}</div>
                  <div className="cs-tl-line"><div className="cs-tl-dot" /></div>
                  <div className="cs-tl-text">{t.milestone}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {proj.links && (
          <div className="cs-section">
            <h2 className="cs-sh">Links</h2>
            <div className="cs-links">
              {proj.links.github && <a href={proj.links.github} target="_blank" rel="noopener" className="cs-link">GitHub ↗</a>}
              {proj.links.demo && <a href={proj.links.demo} target="_blank" rel="noopener" className="cs-link">Live Demo ↗</a>}
              {proj.links.video && <a href={proj.links.video} target="_blank" rel="noopener" className="cs-link">Video ↗</a>}
            </div>
          </div>
        )}

        <div className="cs-pagination">
          {prev
            ? <a href={'#work/' + prev.id} className="cs-pag-link">
                <span className="cs-pag-dir">← Previous</span>
                <span className="cs-pag-title">{prev.title}</span>
              </a>
            : <span />}
          {next
            ? <a href={'#work/' + next.id} className="cs-pag-link" style={{textAlign:'right'}}>
                <span className="cs-pag-dir">Next →</span>
                <span className="cs-pag-title">{next.title}</span>
              </a>
            : <span />}
        </div>
      </div>
    </div>
  );
}

/* ── EXPERIENCE DETAIL PAGE ─────────────────────────── */
function ExperienceHero({ exp }) {
  const hostRef = useRef(null);
  const canvasRef = useRef(null);
  const tempRef = useRef(null);
  const reRef = useRef(null);
  const isFlow = exp.sim === 'flow';

  useEffect(() => {
    if (!isFlow) return;
    return mountFlow(hostRef.current, canvasRef.current, { tempRef, reRef });
  }, [exp.slug, isFlow]);

  return (
    <div className="exp-hero" ref={hostRef}>
      <div className="hero-grid"></div>
      {isFlow && <canvas className="hero-canvas" ref={canvasRef} aria-hidden="true"></canvas>}
      <div className="exp-hero-tag">{exp.place}</div>
      {isFlow && (
        <div className="exp-hero-readout" aria-hidden="true">
          <div className="hero-readout-label">{CONTENT.experiencePage.flowLabel}</div>
          <div>Re ≈ <span className="hero-readout-value" ref={reRef}>—</span> · probe <span className="hero-readout-value" ref={tempRef}>21°C</span></div>
        </div>
      )}
    </div>
  );
}

function ExperiencePage({ exp }) {
  const idx = DATA.experience.findIndex(e => e.slug === exp.slug);
  const prev = DATA.experience[idx - 1] || null;
  const next = DATA.experience[idx + 1] || null;

  useEffect(() => { window.scrollTo(0, 0); }, [exp.slug]);

  return (
    <div className="cs-page">
      <nav className="cs-nav">
        <a href="#experience" className="cs-back">{CONTENT.experiencePage.back}</a>
        {(() => { const [fn,ln] = DATA.profile.name.split(' '); return (
          <a href="#" className="nav-logo" style={{display:'flex',alignItems:'center',gap:10}}>
            <img src="assets/icons/logo-red.png" className="logo-img" alt="" width="28" height="28" />
            {fn} <span>{ln}</span>
          </a>
        ); })()}
      </nav>

      <ExperienceHero exp={exp} />

      <div className="cs-header">
        <div className="cs-tags-row"><span className="proj-tag">{exp.date}</span></div>
        <h1 className="cs-title">{exp.title}</h1>
        <div className="cs-subtitle">{exp.place}</div>
      </div>

      <div className="cs-body">
        <div className="cs-section">
          <h2 className="cs-sh">{CONTENT.experiencePage.overview}</h2>
          <p className="cs-p">{exp.detail || exp.desc}</p>
        </div>

        {exp.highlights && (
          <div className="cs-section">
            <h2 className="cs-sh">Highlights</h2>
            <ul className="exp-highlights">
              {exp.highlights.map((h, i) => <li key={i}>{h}</li>)}
            </ul>
          </div>
        )}

        {exp.focus && (
          <div className="cs-section">
            <h2 className="cs-sh">{CONTENT.experiencePage.focus}</h2>
            <div className="exp-focus">
              {exp.focus.map(f => <span key={f} className="exp-focus-tag">{f}</span>)}
            </div>
          </div>
        )}

        <div className="cs-pagination">
          {prev
            ? <a href={'#experience/' + prev.slug} className="cs-pag-link">
                <span className="cs-pag-dir">← Previous</span>
                <span className="cs-pag-title">{prev.place}</span>
              </a>
            : <span />}
          {next
            ? <a href={'#experience/' + next.slug} className="cs-pag-link" style={{textAlign:'right'}}>
                <span className="cs-pag-dir">Next →</span>
                <span className="cs-pag-title">{next.place}</span>
              </a>
            : <span />}
        </div>
      </div>
    </div>
  );
}

function Portfolio() {
  useMagneticButtons();
  useSectionReveal();
  return (
    <>
      <CursorCrosshair />
      <Nav />
      <main>
        <Hero />
        <Projects />
        <Skills />
        <Experience />
        <Contact />
      </main>
      <footer style={{borderTop:'1px solid var(--border2)'}}>
        <div className="footer-inner">
          {(() => { const [fn,ln] = DATA.profile.name.split(' '); return <div className="footer-name">{fn} <span>{ln}</span></div>; })()}
          <div className="footer-links">
            {CONTENT.footer.links.map(l => (
              <a key={l.label} href={l.href} {...(l.external ? {target:'_blank',rel:'noopener'} : {})}>{l.label}</a>
            ))}
          </div>
          <div className="footer-copy">© {new Date().getFullYear()} · {CONTENT.footer.copy}</div>
        </div>
      </footer>
    </>
  );
}

function App() {
  const hash = useRouter();
  const csMatch = hash.match(/^#work\/(.+)$/);
  if (csMatch) {
    const proj = DATA.projects.find(p => p.id === csMatch[1]);
    if (proj) return <CaseStudy proj={proj} />;
  }
  const expMatch = hash.match(/^#experience\/(.+)$/);
  if (expMatch) {
    const exp = DATA.experience.find(e => e.slug === expMatch[1]);
    if (exp) return <ExperiencePage exp={exp} />;
  }
  return <Portfolio />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
