<style>
/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { overflow-x: hidden; line-height: 1; }

/* ── DESIGN TOKENS ──────────────────────────────────── */
:root {
  --bg:#f4efe6; --bg2:#ece6db; --bg3:rgba(184,50,50,.06); --bg4:#e8e1d4;
  --fg:#1a1208; --fg2:#6b5e52; --fg3:rgba(26,18,8,.3);
  --accent:#b83232; --border:rgba(26,18,8,.12); --border2:rgba(26,18,8,.06);
  --grid:rgba(26,18,8,.04); --glow:rgba(184,50,50,.09);
  --fh:'DM Serif Display',serif; --fb:'DM Sans',sans-serif; --fm:'Fira Code',monospace;
  --r:1px; --sh:0 2px 20px rgba(26,18,8,.08);
  --skill-a:#b83232; --skill-b:#16a34a; --skill-c:#1e3a5f;
}

/* ── BASE ───────────────────────────────────────────── */
body { background:var(--bg); color:var(--fg); font-family:var(--fb); transition:background .4s,color .4s; }
::selection { background:var(--accent); color:var(--bg); }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── LOGO ───────────────────────────────────────────── */
.logo-img { width:28px; height:28px; flex-shrink:0; display:block; }

/* ── NAV ────────────────────────────────────────────── */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 52px; transition:background .3s,border-color .3s,backdrop-filter .3s;
}
.nav.scrolled {
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter:blur(16px); border-bottom:1px solid var(--border2);
}
.nav-logo {
  font-family:var(--fh); font-size:17px; font-weight:700;
  letter-spacing:-0.02em; color:var(--fg); text-decoration:none;
  word-spacing:-3px;
}
.nav-logo span { color:var(--accent); }
.nav-links { display:flex; gap:40px; }
.nav-links a {
  color:var(--fg2); font-size:12px; text-decoration:none;
  letter-spacing:.08em; text-transform:uppercase; font-family:var(--fm);
  transition:color .2s;
}
.nav-links a:hover { color:var(--accent); }


/* ── HERO ───────────────────────────────────────────── */
.hero {
  position:relative; width:100%; height:100vh;
  display:flex; align-items:center; overflow:hidden; background:var(--bg);
}
.hero-grid {
  position:absolute; inset:0; z-index:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}
.hero-glow {
  position:absolute; z-index:1; width:560px; height:560px; border-radius:50%;
  background:radial-gradient(circle,var(--glow) 0%,transparent 70%);
  pointer-events:none; transform:translate(-50%,-50%);
  transition:opacity .4s; opacity:0;
}
.hero-inner {
  position:relative; z-index:2; padding:0 52px; padding-top:80px;
  width:100%; max-width:1200px; margin:0 auto;
}
.hero-eyebrow {
  display:flex; align-items:center; gap:14px;
  font-family:var(--fm); font-size:11px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--accent); margin-bottom:28px;
}
.hero-eyebrow::before { content:''; width:36px; height:1px; background:var(--accent); }
.hero-h1 {
  font-family:var(--fh); font-weight:700; line-height:.95;
  letter-spacing:-0.04em; color:var(--fg); margin-bottom:28px;
  font-size:clamp(56px,9vw,120px);
}
.hero-h1 .accent { color:var(--accent); }
.hero-bio {
  font-family:var(--fb); font-size:17px; line-height:1.65;
  color:var(--fg2); max-width:480px; margin-bottom:52px; font-weight:400;
}
.hero-ctas { display:flex; gap:14px; flex-wrap:wrap; }
.btn-p {
  font-family:var(--fm); font-size:12px; letter-spacing:.1em; text-transform:uppercase;
  background:var(--accent); color:var(--bg); border:none; padding:15px 36px;
  cursor:pointer; font-weight:600; border-radius:var(--r); text-decoration:none;
  display:inline-block; transition:opacity .2s,transform .2s;
}
.btn-p:hover { opacity:.85; transform:translateY(-2px); }
.btn-g {
  font-family:var(--fm); font-size:12px; letter-spacing:.1em; text-transform:uppercase;
  background:transparent; color:var(--fg); border:1px solid var(--border); padding:15px 36px;
  cursor:pointer; border-radius:var(--r); text-decoration:none; display:inline-block;
  transition:border-color .2s,color .2s;
}
.btn-g:hover { border-color:var(--accent); color:var(--accent); }
.hero-meta {
  position:absolute; right:52px; bottom:0; top:80px;
  display:flex; flex-direction:column; justify-content:flex-end; padding-bottom:52px;
  gap:32px; z-index:2;
}
.hero-stat { text-align:right; }
.hero-stat-n { font-family:var(--fh); font-size:36px; font-weight:700; color:var(--fg); letter-spacing:-0.04em; }
.hero-stat-l { font-family:var(--fm); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--fg2); margin-top:4px; }
.scroll-cue {
  position:absolute; bottom:36px; left:52px; z-index:2;
  display:flex; align-items:center; gap:14px;
  font-family:var(--fm); font-size:10px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--fg3);
}
.scroll-line { width:48px; height:1px; background:var(--accent); animation:scrollPulse 2.4s ease-in-out infinite; transform-origin:left; }
@keyframes scrollPulse { 0%,100%{transform:scaleX(.4);opacity:.4} 50%{transform:scaleX(1);opacity:1} }



/* ── SECTIONS ───────────────────────────────────────── */
.wrap { max-width:1200px; margin:0 auto; padding:0 52px; }
.sec { padding:120px 0; border-top:1px solid var(--border2); }
.sec-label {
  display:flex; align-items:center; gap:12px;
  font-family:var(--fm); font-size:10px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--accent); margin-bottom:18px;
}
.sec-label::before { content:attr(data-n); opacity:.45; }
.sec-title {
  font-family:var(--fh); font-size:clamp(34px,4.5vw,56px);
  font-weight:700; letter-spacing:-0.035em; color:var(--fg);
  margin-bottom:64px; line-height:1.05;
}

/* ── PROJECTS ───────────────────────────────────────── */
.proj-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:2px; background:var(--border2); border:1px solid var(--border2); }
.proj-card {
  background:var(--bg); padding:44px; cursor:pointer;
  transition:background .25s; position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
.proj-card:hover { background:var(--bg2); }
.proj-card::after {
  content:''; position:absolute; top:0; left:0; bottom:0; width:3px;
  background:var(--accent); transform:scaleY(0); transform-origin:bottom;
  transition:transform .3s ease;
}
.proj-card:hover::after { transform:scaleY(1); }
.proj-badge {
  display:inline-flex; align-items:center;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--accent); border:1px solid var(--border); padding:5px 12px;
  margin-bottom:28px; border-radius:var(--r); width:fit-content;
}
.proj-placeholder {
  width:100%; height:180px; margin-bottom:28px;
  background:repeating-linear-gradient(135deg,var(--bg2) 0,var(--bg2) 8px,var(--bg4) 8px,var(--bg4) 16px);
  border:1px solid var(--border2); border-radius:var(--r);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg3); flex-shrink:0;
}
.proj-title { font-family:var(--fh); font-size:22px; font-weight:700; letter-spacing:-0.025em; color:var(--fg); margin-bottom:10px; }
.proj-short { font-size:14px; color:var(--fg2); line-height:1.6; margin-bottom:24px; flex:1; }
.proj-tags { display:flex; flex-wrap:wrap; gap:6px; }
.proj-tag {
  font-family:var(--fm); font-size:10px; color:var(--fg2);
  padding:4px 9px; background:var(--bg3); border:1px solid var(--border2);
  border-radius:var(--r); letter-spacing:.04em;
}
.proj-arrow { position:absolute; bottom:32px; right:36px; color:var(--accent); font-size:22px; opacity:0; transition:opacity .2s,transform .2s; }
.proj-card:hover .proj-arrow { opacity:1; transform:translate(3px,-3px); }

/* ── 3D MODEL VIEWER ────────────────────────────────── */
.model-viewer {
  width:100%; height:180px; margin-bottom:28px;
  background:repeating-linear-gradient(135deg,var(--bg2) 0,var(--bg2) 8px,var(--bg4) 8px,var(--bg4) 16px);
  border:1px solid var(--border2); border-radius:var(--r);
  position:relative; overflow:hidden; flex-shrink:0;
}
.model-viewer canvas { display:block; width:100% !important; height:100% !important; }
.model-viewer.loading::after {
  content:'Loading 3D model…'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg3);
}
.modal-viewer { height:320px; margin-bottom:40px; }
.viewer-toggle {
  position:absolute; bottom:12px; right:12px; z-index:2;
  font-family:var(--fm); font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg2);
  background:color-mix(in srgb, var(--bg) 90%, transparent);
  border:1px solid var(--border); padding:6px 12px;
  border-radius:var(--r); cursor:pointer;
  transition:color .2s,border-color .2s;
}
.viewer-toggle:hover { color:var(--accent); border-color:var(--accent); }

/* ── MODAL ──────────────────────────────────────────── */
.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.65); backdrop-filter:blur(10px);
  display:flex; align-items:center; justify-content:center;
  padding:24px; animation:fadeIn .2s ease;
}
.modal {
  background:var(--bg2); border:1px solid var(--border);
  width:100%; max-width:740px; max-height:88vh; overflow-y:auto;
  padding:52px; border-radius:calc(var(--r)*3);
  box-shadow:var(--sh); animation:slideUp .28s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-close {
  float:right; margin-left:16px; background:none; border:1px solid var(--border);
  color:var(--fg2); padding:8px 18px; cursor:pointer; font-family:var(--fm);
  font-size:11px; letter-spacing:.1em; text-transform:uppercase; border-radius:var(--r);
  transition:color .2s,border-color .2s;
}
.modal-close:hover { color:var(--accent); border-color:var(--accent); }
.modal-tag { font-family:var(--fm); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
.modal-h { font-family:var(--fh); font-size:30px; font-weight:700; letter-spacing:-0.03em; color:var(--fg); margin-bottom:8px; }
.modal-sub { font-size:14px; color:var(--fg2); margin-bottom:36px; }
.modal-placeholder {
  width:100%; height:220px; margin-bottom:40px;
  background:repeating-linear-gradient(135deg,var(--bg) 0,var(--bg) 8px,var(--bg2) 8px,var(--bg2) 16px);
  border:1px solid var(--border2); border-radius:var(--r);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fm); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--fg3);
}
.modal-sh { font-family:var(--fm); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; margin-top:32px; }
.modal-p { font-size:15px; line-height:1.75; color:var(--fg2); }
.modal-code {
  background:var(--bg4); border:1px solid var(--border2); padding:18px 22px;
  font-family:var(--fm); font-size:13px; color:var(--accent);
  border-radius:var(--r); margin:12px 0; overflow-x:auto; white-space:nowrap;
}
.modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:32px; }

/* ── SKILLS ─────────────────────────────────────────── */
.skills-wrap {
  width:100%; height:460px; position:relative;
  border-top:1px solid var(--border2); border-bottom:1px solid var(--border2);
  overflow:hidden; background:var(--bg2);
}
.skills-hint {
  position:absolute; bottom:16px; right:24px; z-index:1; pointer-events:none;
  font-family:var(--fm); font-size:10px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--fg3);
}

/* ── EXPERIENCE ─────────────────────────────────────── */
.timeline { display:flex; flex-direction:column; }
.tl-item {
  display:grid; grid-template-columns:180px 1px 1fr;
  column-gap:36px; align-items:start; padding-bottom:52px;
}
.tl-item:last-child { padding-bottom:0; }
.tl-date { font-family:var(--fm); font-size:11px; color:var(--fg2); letter-spacing:.05em; padding-top:2px; text-align:right; line-height:1.6; }
.tl-line { background:var(--border2); position:relative; }
.tl-dot {
  position:absolute; top:4px; left:50%; transform:translateX(-50%);
  width:9px; height:9px; border-radius:50%;
  background:var(--accent); border:2px solid var(--bg);
}
.tl-place { font-family:var(--fm); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
.tl-title { font-family:var(--fh); font-size:20px; font-weight:600; letter-spacing:-0.02em; color:var(--fg); margin-bottom:10px; }
.tl-desc { font-size:14px; color:var(--fg2); line-height:1.75; }

/* ── CONTACT ────────────────────────────────────────── */
.contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; background:var(--border2); border:1px solid var(--border2); margin-top:64px; }
.contact-cell { background:var(--bg); padding:44px; }
.contact-cell.accent-bg { background:var(--accent); }
.contact-label { font-family:var(--fm); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--fg2); margin-bottom:12px; }
.contact-cell.accent-bg .contact-label { color:var(--bg); opacity:.7; }
.contact-value { font-family:var(--fh); font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--fg); text-decoration:none; display:block; transition:opacity .2s; }
.contact-value:hover { opacity:.7; }
.contact-cell.accent-bg .contact-value { color:var(--bg); }
.contact-big { font-family:var(--fh); font-size:clamp(40px,6vw,72px); font-weight:700; letter-spacing:-0.04em; color:var(--fg); line-height:1; margin-bottom:24px; }
.contact-sub { font-family:var(--fb); font-size:15px; color:var(--fg2); line-height:1.6; max-width:360px; }
.contact-cta { display:inline-flex; align-items:center; gap:10px; margin-top:32px; }

/* ── FOOTER ─────────────────────────────────────────── */
.footer-inner {
  display:flex; justify-content:space-between; align-items:center;
  padding:40px 52px;
}
.footer-name { font-family:var(--fh); font-size:18px; font-weight:700; letter-spacing:-0.02em; }
.footer-name span { color:var(--accent); }
.footer-links { display:flex; gap:28px; }
.footer-links a { font-family:var(--fm); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--fg2); text-decoration:none; transition:color .2s; }
.footer-links a:hover { color:var(--accent); }
.footer-copy { font-family:var(--fm); font-size:10px; color:var(--fg3); letter-spacing:.06em; }

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:900px){
  .nav{padding:18px 24px;} .nav-links{display:none;}
  .hero-inner{padding:0 24px; padding-top:80px;}
  .hero-meta{display:none;}
  .scroll-cue{left:24px;}
  .wrap{padding:0 24px;}
  .proj-grid{grid-template-columns:1fr;}
  .tl-item{grid-template-columns:100px 1px 1fr; column-gap:20px;}
  .footer-inner{flex-direction:column;gap:24px;text-align:center;padding:32px 24px;}
  .modal{padding:32px 24px;}
}
</style>
</head>

/* ── MODEL VIEWER ───────────────────────────────────── */
function ModelViewer({ path, withControls = false, autoRotate = true }) {
  const mountRef = useRef(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!path || !mountRef.current) return;

    let disposed = false;
    let animId = null;
    let resizeObs = null;
    let renderer, scene, camera, controls, model;

    const init = () => {
      if (!window.THREE || !window.GLTFLoader) {
        window.addEventListener('three-ready', init, { once: true });
        return;
      }
      const THREE = window.THREE;
      const mount = mountRef.current;
      if (!mount) return;

      const w = mount.clientWidth || 400;
      const h = mount.clientHeight || 180;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 1000);
      camera.position.set(0, 0.4, 3.2);

      renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      mount.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 1.6));
      const key = new THREE.DirectionalLight(0xffffff, 2.2);
      key.position.set(4, 6, 5); scene.add(key);
      const fill = new THREE.DirectionalLight(0xffffff, 1.1);
      fill.position.set(-5, 3, 4); scene.add(fill);
      const back = new THREE.DirectionalLight(0xffffff, 0.9);
      back.position.set(0, -2, -5); scene.add(back);
      const rim = new THREE.DirectionalLight(0xb83232, 0.5);
      rim.position.set(-4, 2, -3); scene.add(rim);

      if (withControls && window.TrackballControls) {
        controls = new window.TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 4.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.noPan = true;
        controls.staticMoving = false;
        controls.dynamicDampingFactor = 0.15;
        controls.minDistance = 1.5;
        controls.maxDistance = 8;
      }

      const loader = new window.GLTFLoader();
      loader.load(path, (gltf) => {
        if (disposed) return;
        model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3(); box.getSize(size);
        const center = new THREE.Vector3(); box.getCenter(center);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = withControls ? 1.8 : 1.6;
        const scale = targetSize / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));

        // Identify the yellow and grey materials in the GLB, then reassign
        // meshes using a grey material to share the yellow material reference
        // so all PBR properties (maps, roughness, metalness) match exactly.
        const allMats = new Set();
        model.traverse(child => {
          if (!child.isMesh) return;
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => m && allMats.add(m));
        });
        let yellowMat = null;
        const greyMats = new Set();
        allMats.forEach(mat => {
          if (!mat.color) return;
          const {r, g, b} = mat.color;
          const max = Math.max(r, g, b), min = Math.min(r, g, b);
          const sat = max > 0.01 ? (max - min) / max : 0;
          const brightness = (r + g + b) / 3;
          if (sat >= 0.25 && r > g && g > b && !yellowMat) yellowMat = mat;
          else if (sat < 0.2 && brightness > 0.12 && brightness < 0.88) greyMats.add(mat);
        });
        if (yellowMat && greyMats.size) {
          model.traverse(child => {
            if (!child.isMesh) return;
            if (Array.isArray(child.material)) {
              child.material = child.material.map(m => greyMats.has(m) ? yellowMat : m);
            } else if (greyMats.has(child.material)) {
              child.material = yellowMat;
            }
          });
        }

        scene.add(model);
        setLoading(false);
      }, undefined, (err) => {
        console.warn('GLB load failed:', err);
        setLoading(false);
      });

      resizeObs = new ResizeObserver(() => {
        if (!mount || !renderer || !camera) return;
        const rw = mount.clientWidth, rh = mount.clientHeight;
        renderer.setSize(rw, rh);
        camera.aspect = rw / rh;
        camera.updateProjectionMatrix();
      });
      resizeObs.observe(mount);

      const tick = () => {
        if (disposed) return;
        if (model && autoRotate) model.rotation.y += 0.005;
        if (controls) controls.update();
        renderer.render(scene, camera);
        animId = requestAnimationFrame(tick);
      };
      tick();
    };

    init();

    return () => {
      disposed = true;
      if (animId) cancelAnimationFrame(animId);
      if (resizeObs) resizeObs.disconnect();
      if (controls) controls.dispose();
      if (renderer) {
        renderer.dispose();
        if (renderer.domElement && renderer.domElement.parentNode) {
          renderer.domElement.parentNode.removeChild(renderer.domElement);
        }
      }
      if (scene) {
        scene.traverse(o => {
          if (o.geometry) o.geometry.dispose();
          if (o.material) {
            const mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach(m => m.dispose && m.dispose());
          }
        });
      }
    };
  }, [path, withControls, autoRotate]);

  return <div ref={mountRef} className={`model-viewer${withControls ? ' modal-viewer' : ''}${loading ? ' loading' : ''}`}></div>;
}

/* ── HERO ───────────────────────────────────────────── */
function Hero() {
  const heroRef = useRef(null);
  const glowRef = useRef(null);

  useEffect(() => {
    const hero = heroRef.current;
    const glow = glowRef.current;
    if (!hero || !glow) return;
    let rafId = null;
    let tx = hero.clientWidth / 2, ty = hero.clientHeight / 2;

    const onMove = e => {
      const r = hero.getBoundingClientRect();
      tx = e.clientX - r.left; ty = e.clientY - r.top;
      glow.style.opacity = '1';
      if (!rafId) rafId = requestAnimationFrame(tick);
    };
    const tick = () => {
      glow.style.left = tx + 'px'; glow.style.top = ty + 'px';
      rafId = null;
    };
    const onLeave = () => { glow.style.opacity = '0'; };
    hero.addEventListener('mousemove', onMove);
    hero.addEventListener('mouseleave', onLeave);
    return () => {
      hero.removeEventListener('mousemove', onMove);
      hero.removeEventListener('mouseleave', onLeave);
      if (rafId) cancelAnimationFrame(rafId);
    };
  }, []);

  const name = DATA.profile.name;
  const [first, last] = name.split(' ');

  return (
    <section className="hero" ref={heroRef}>
      <div className="hero-grid"></div>
      <div className="hero-glow" ref={glowRef}></div>
      {/* Industrial decoration */}
      <div style={{position:'absolute',top:100,right:52,width:100,height:100,border:'1px solid var(--accent)',opacity:.2,zIndex:2}}>

        <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:'1px',background:'var(--accent)'}}></div>

        <div className="hero-eyebrow">{DATA.profile.current}</div>
        <h1 className="hero-h1">{first} {last}</h1>
        <p className="hero-bio">{DATA.profile.bio}</p>

/* ── SKILLS ─────────────────────────────────────────── */
function Skills({ themeKey }) {
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!wrapRef.current || !window.Matter) return;
    const wrap = wrapRef.current;
    const { Engine, Render, World, Bodies, Mouse, MouseConstraint, Runner, Events } = Matter;
    const W = wrap.clientWidth || 1100;
    const H = 460;

    const engine = Engine.create();
    const render = Render.create({
      element: wrap, engine,
      options: { width: W, height: H, wireframes: false, background: 'transparent', pixelRatio: Math.min(window.devicePixelRatio, 2) }
    });

    const wall = { isStatic: true, render: { fillStyle: 'transparent', strokeStyle: 'transparent', lineWidth: 0 } };
    World.add(engine.world, [
      Bodies.rectangle(W/2, H+25, W, 50, wall),
      Bodies.rectangle(-25,  H/2, 50, H,  wall),
      Bodies.rectangle(W+25, H/2, 50, H,  wall),
    ]);

    // Read CSS skill category colors at runtime
    const cs = getComputedStyle(document.documentElement);
    const catColor = {
      Software:   cs.getPropertyValue('--skill-a').trim() || '#3b82f6',
      Mechanical: cs.getPropertyValue('--skill-b').trim() || '#f59e0b',
      Embedded:   cs.getPropertyValue('--skill-c').trim() || '#10b981',
    };

    DATA.skills.forEach((s, i) => {
      const tw = Math.max(120, s.name.length * 9 + 44);
      const th = 46;
      const x = Math.random() * (W - 180) + 90;
      const y = -Math.random() * 380 - 60;
      const b = Bodies.rectangle(x, y, tw, th, {
        restitution: .5, friction: .4,
        chamfer: { radius: 8 },
        label: s.name,
        plugin: { color: catColor[s.cat] || '#64748b', w: tw, h: th },
      });
      World.add(engine.world, b);
    });

    const mouse = Mouse.create(render.canvas);
    mouse.pixelRatio = Math.min(window.devicePixelRatio, 2);
    // Matter.js attaches mousewheel listeners that call preventDefault — strip them
    // so the page can still scroll when the cursor is over the physics canvas.
    mouse.element.removeEventListener('mousewheel', mouse.mousewheel);
    mouse.element.removeEventListener('DOMMouseScroll', mouse.mousewheel);
    const mc = MouseConstraint.create(engine, { mouse, constraint: { stiffness: .2, render: { visible: false } } });
    World.add(engine.world, mc);
    render.mouse = mouse;

    Events.on(render, 'afterRender', () => {
      const ctx = render.context;
      const fgColor = getComputedStyle(document.documentElement).getPropertyValue('--fg').trim() || '#fff';
      const fontM = "'Fira Code', monospace";
      engine.world.bodies.forEach(b => {
        if (b.isStatic) return;
        const { x, y } = b.position;
        const a = b.angle;
        const { color = '#64748b', w = 120, h = 46 } = b.plugin || {};
        const r = 8;
        ctx.save();
        ctx.translate(x, y); ctx.rotate(a);
        // pill bg
        ctx.beginPath();
        ctx.moveTo(-w/2+r,-h/2); ctx.lineTo(w/2-r,-h/2);
        ctx.quadraticCurveTo(w/2,-h/2,w/2,-h/2+r);
        ctx.lineTo(w/2,h/2-r); ctx.quadraticCurveTo(w/2,h/2,w/2-r,h/2);
        ctx.lineTo(-w/2+r,h/2); ctx.quadraticCurveTo(-w/2,h/2,-w/2,h/2-r);
        ctx.lineTo(-w/2,-h/2+r); ctx.quadraticCurveTo(-w/2,-h/2,-w/2+r,-h/2);
        ctx.closePath();
        ctx.fillStyle = color + '28'; ctx.fill();
        ctx.strokeStyle = color + '80'; ctx.lineWidth = 1; ctx.stroke();
        // label
        ctx.fillStyle = fgColor;
        ctx.font = `500 12px ${fontM}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(b.label, 0, 0);
        ctx.restore();
      });
    });

    const runner = Runner.create();
    Runner.run(runner, engine);
    Render.run(render);

    return () => {
      Render.stop(render); Runner.stop(runner);
      World.clear(engine.world); Engine.clear(engine);
      if (render.canvas) render.canvas.remove();
    };
  }, [themeKey]);

  return (
    <section id="skills" className="sec" style={{paddingTop:120,paddingBottom:0,borderTop:'1px solid var(--border2)'}}>
      <div className="wrap" style={{paddingBottom:64}}>
        <div className="sec-label" data-n="02 /">Skills</div>
        <div className="sec-title" style={{marginBottom:0}}>Technical Toolkit</div>
      </div>
      <div className="skills-wrap" ref={wrapRef}>
        <div className="skills-hint">Drag to interact</div>
      </div>
    </section>
  );
}
